name: MarketFlock Auto-Publish

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests python-dotenv

      - name: Run MarketFlock Pipeline
        env:
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: python3 run_flock.py

      - name: Commit and push publish
        run: |
          git config user.email "flock@marketflock.cutbar.in"
          git config user.name "MarketFlock Bot"
          git add publish/ history.json
          git diff --staged --quiet || git commit -m "Auto-publish: $(date '+%Y-%m-%d %H:%M')"
          git push
