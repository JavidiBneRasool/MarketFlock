name: Autoflock Autonomous Cycle

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install feedparser requests

      - name: Inject Social Config
        run: |
          mkdir -p config
          echo '${{ secrets.SOCIAL_JSON }}' > config/social.json

      - name: Run AI Pipeline
        run: python3 run_flock.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "Autoflock Bot"
          git config --global user.email "bot@autoflock.ai"
          git add .
          git commit -m "Autonomous Update: $(date)" || echo "No changes to commit"
          git push
