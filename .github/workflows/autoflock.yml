    1 name: 🤖 Autoflock Autonomous Cycle
    2
    3 on:
    4   schedule:
    5     - cron: '0 * * * *' # Every hour (at the start of the hour)
    6   workflow_dispatch: # Allows manual trigger
    7
    8 jobs:
    9   build-and-publish:
   10     runs-on: ubuntu-latest
   11     steps:
   12       - name: 📂 Checkout Repository
   13         uses: actions/checkout@v4
   14
   15       - name: 🐍 Set up Python
   16         uses: actions/setup-python@v5
   17         with:
   18           python-version: '3.10'
   19
   20       - name: 📦 Install Dependencies
   21         run: pip install feedparser requests
   22         env:
   23           FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
   24
   25       - name: 🔧 Inject Social Config
   26         run: |
   27           mkdir -p config
   28           echo '${{ secrets.SOCIAL_JSON }}' > config/social.json
   29
   30       - name: 🐑 Run AI Pipeline
   31         run: python3 run_flock.py
   32
   33       - name: 🚀 Commit & Push Changes
   34         run: |
   35           git config --global user.name "Autoflock Bot"
   36           git config --global user.email "bot@autoflock.ai"
   37           git add .
   38           git commit -m "🤖 Autonomous Update: $(date)" || echo "No changes
      to commit"
   39           git push

  ---         
